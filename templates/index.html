<!DOCTYPE html>
<html>
<head>
    <title>Movie Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🎬 Movie Success Predictor</h1>

    <form method="POST">
        <input type="text" name="movie" placeholder="Enter movie name">
        <button type="submit">Predict</button>
    </form>

    {% if movie %}
    <div class="card">
        <img src="{{ movie.poster }}" width="200">
        <h2>{{ movie.title }}</h2>
        <p>⭐ Rating: {{ movie.rating }}</p>
        <h2>{{ label }}</h2>
        <p>🎯 Hit Probability: {{ prediction }}%</p>

        <img src="/static/importance.png" width="400">
        <img src="/static/confusion.png" width="400">
    </div>
    {% endif %}

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
</div>

</body>
</html>
